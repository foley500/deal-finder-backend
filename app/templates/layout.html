<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Thea's Smelly Deal Finder</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="/static/css/styles.css">

    <style>
        body {
            background-color: #0b1120;
            color: #f1f5f9;
            font-weight: 400;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: linear-gradient(180deg, #0b1120, #111827);
            position: fixed;
            padding: 30px;
            border-right: 1px solid #1f2937;
        }

        .sidebar h4 {
            font-weight: 600;
            margin-bottom: 25px;
        }

        .sidebar a {
            display: block;
            color: #94a3b8;
            margin-bottom: 14px;
            text-decoration: none;
            transition: 0.2s ease;
        }

        .sidebar a:hover {
            color: #22c55e;
        }

        /* Topbar */
        .topbar {
            margin-left: 240px;
            padding: 18px 40px;
            border-bottom: 1px solid #1f2937;
            background-color: #0b1120;
        }

        /* Content */
        .content {
            margin-left: 240px;
            padding: 40px;
        }

        /* Cards */
        .card {
            background: linear-gradient(145deg, #111827, #0f172a);
            border-radius: 22px;
            border: 1px solid #1f2937;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
        }

        /* Tables */
        table {
            color: #f1f5f9;
        }

        .table thead tr {
            border-bottom: 1px solid #1f2937;
            color: #94a3b8;
        }

        .table tbody tr {
            border-bottom: 1px solid #1f2937;
            transition: background 0.2s ease;
        }

        .table-hover tbody tr:hover {
            background-color: #1e293b;
        }

        .table td,
        .table th {
            padding: 16px 14px;
        }

        .table a {
            color: #e2e8f0;
            text-decoration: none;
            font-weight: 500;
        }

        .table a:hover {
            color: #22c55e;
        }

        /* Buttons */
        .btn-danger {
            background-color: #dc2626;
            border: none;
            border-radius: 10px;
        }

        .btn-danger:hover {
            background-color: #ef4444;
        }

        /* Metrics */
        .metric {
            font-size: 28px;
            font-weight: 600;
        }

        .muted {
            color: #94a3b8;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h4>Thea's Smelly Bum Deal Finder</h4>
    <a href="/">Dashboard</a>
    <a href="/deals">All Deals</a>
    <a href="/analytics">Analytics</a>
</div>

<div class="topbar d-flex justify-content-between align-items-center">
    <div>Dealer Intelligence Platform</div>
    <span class="badge bg-success">System Online</span>
</div>

<div class="content">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS Bundle (REQUIRED for accordion / dropdowns) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
