<!-- MARKET VALUATION -->
<div class="card p-4 mb-4">
    <h5 class="mb-3">Market Valuation (Sold Data Model)</h5>

    {% if report.market_model.market_price %}
        <div class="d-flex justify-content-between">
            <span>Estimated Market Price</span>
            <strong>£{{ report.market_model.market_price }}</strong>
        </div>

        <div class="small text-secondary mt-2">
            Source: {{ report.market_model.source }}
        </div>
    {% else %}
        <p>No sold data available</p>
    {% endif %}
</div>
