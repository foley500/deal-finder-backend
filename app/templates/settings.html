{% extends "layout.html" %}
{% block content %}

<h2 class="mb-4">Dealer Settings</h2>

<form method="post">

    <div class="mb-3">
        <label>Minimum Year</label>
        <input type="number" name="min_year" class="form-control"
               value="{{ settings.min_year }}">
    </div>

    <div class="mb-3">
        <label>Maximum Year</label>
        <input type="number" name="max_year" class="form-control"
               value="{{ settings.max_year }}">
    </div>

    <div class="mb-3">
        <label>Maximum Mileage</label>
        <input type="number" name="max_mileage" class="form-control"
               value="{{ settings.max_mileage }}">
    </div>

    <div class="mb-3">
        <label>Minimum Profit</label>
        <input type="number" step="0.01" name="min_profit" class="form-control"
               value="{{ settings.min_profit }}">
    </div>

    <div class="mb-3">
        <label>Minimum Score</label>
        <input type="number" step="0.1" name="min_score" class="form-control"
               value="{{ settings.min_score }}">
    </div>

    <hr class="my-4">
    <h5 class="mb-3">Search Area</h5>
    <p class="text-muted small">Restrict deal searches to listings within a radius of your location. Leave blank for nationwide search.</p>

    <div class="row">
        <div class="col-md-6 mb-3">
            <label>Your Postcode</label>
            <input type="text" name="search_postcode" class="form-control"
                   placeholder="e.g. S43 4TW"
                   value="{{ settings.search_postcode or '' }}">
        </div>
        <div class="col-md-6 mb-3">
            <label>Search Radius (miles)</label>
            <input type="number" name="search_radius_miles" class="form-control"
                   placeholder="e.g. 75"
                   value="{{ settings.search_radius_miles or '' }}">
        </div>
    </div>

    <button type="submit" class="btn btn-success">
        Save Settings
    </button>

</form>

{% endblock %}
