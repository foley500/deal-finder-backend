<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b1120;
      color: #f1f5f9;
      width: 300px;
      padding: 16px;
    }

    h3 {
      font-size: 14px;
      font-weight: 600;
      color: #22c55e;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
      margin-top: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 4px;
    }

    .field label {
      display: block;
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 4px;
    }

    .field input {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      color: #f1f5f9;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 13px;
    }

    .field input:focus {
      outline: none;
      border-color: #22c55e;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    button {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    #saveBtn {
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
    }

    #saveBtn:hover { background: #334155; color: #f1f5f9; }

    #sendBtn {
      background: #22c55e;
      color: #000;
    }

    #sendBtn:hover { background: #16a34a; }
    #sendBtn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

    #status {
      margin-top: 12px;
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      display: none;
    }

    #status.success {
      background: rgba(34,197,94,0.15);
      color: #22c55e;
      border: 1px solid rgba(34,197,94,0.3);
      display: block;
    }

    #status.error {
      background: rgba(239,68,68,0.15);
      color: #ef4444;
      border: 1px solid rgba(239,68,68,0.3);
      display: block;
    }

    #status.info {
      background: rgba(148,163,184,0.1);
      color: #94a3b8;
      border: 1px solid #334155;
      display: block;
    }
  </style>
</head>
<body>

  <h3>🚗 VehicleIntel</h3>

  <div class="section-title">Scan Filters</div>

  <div class="grid">
    <div class="field">
      <label>Min Year</label>
      <input type="number" id="min_year" placeholder="e.g. 2012">
    </div>
    <div class="field">
      <label>Max Year</label>
      <input type="number" id="max_year" placeholder="e.g. 2024">
    </div>
    <div class="field">
      <label>Max Price (£)</label>
      <input type="number" id="max_price" placeholder="e.g. 10000">
    </div>
    <div class="field">
      <label>Max Mileage</label>
      <input type="number" id="max_mileage" placeholder="e.g. 80000">
    </div>
    <div class="field">
      <label>Min Profit (£)</label>
      <input type="number" id="min_profit" placeholder="e.g. 500">
    </div>
    <div class="field">
      <label>Min Score</label>
      <input type="number" id="min_score" placeholder="e.g. 20">
    </div>
  </div>

  <div class="btn-row">
    <button id="saveBtn">Save Filters</button>
    <button id="sendBtn">Send Listing</button>
  </div>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
